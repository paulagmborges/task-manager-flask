name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build:
    name: Tests and SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run unit tests with coverage
        run: pytest --cov-report=xml
     # - name: Bandit Security Scan
     #   run: |
     #     pip install bandit
     #     bandit -r todo_project -x todo_project/tests
      - name: Dependency Audit
        run: |
          pip install pip-audit
          pip-audit

  deploy_and_scan_stage:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t task-manager-app .
      - name: Run Container in Stage
        run: docker run -d -p 5000:5000 --name meu-app-stage task-manager-app
      - name: OWASP ZAP Baseline Scan
        run: |
          sleep 10
          docker run --rm -t zaproxy/zap-stable zap-baseline.py -t http://172.17.0.1:5000
